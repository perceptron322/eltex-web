<main class="main">
    <app-blog-list
        (openEdit)="onShowEditFormClick($event)"
    />

    @if (showForm) {
        <app-add-blog-form 
            #addBlogForm
            (close)="showForm = false"
            [editData]="post"
        />
    }

    <aside class="admin-panel">
        <div class="admin-buttons-wrapper">
            <button
                class="admin-add-blog-button"
                type="button"
                title="Создать статью"
                (click)="onShowAddFormClick()"
            >
                <mat-icon class="admin-panel-icon" svgIcon="addArticle"></mat-icon>
            </button>
            <button
                class="admin-show-stat-button" 
                type="button" 
                title="Показать статистику"
                (click)="openStats()"
            >
                <mat-icon class="admin-panel-icon" svgIcon="showStats"></mat-icon>
            </button>
        </div>
    </aside>
    
    <app-statistic-modal/>
</main>
