<main class="main">
    <section class="blogs container" id="blogs">
        <h1 class="blogs-title">My blogs</h1>
        <p class="blogs-description">
            Lorem occaecat proident excepteur commodo et nulla eiusmod. 
            Elit esse aute officia dolor elit aute
        </p>
        
        <ul class="blogs-card-list" [class.blog-list--empty] = "blogStorage.getPostsCount() == 0">
            @for (post of blogStorage.posts; track post.id) {
                <li class="blogs-card-item">
                    <img 
                        class="blogs-card-item-image"
                        src="./images/hobby_section/small-non-image.jpg" 
                        alt=""
                    />
                    <div class="blogs-card-item-text">
                        <p class="blogs-card-item-title">
                            {{ post.title }}
                        </p>
                        <p class="blogs-card-item-description">
                            {{ post.text }}
                        </p>
                        <time class="blogs-card-item-date" datetime="2025-10-16">Oct 16, 2025</time>
                    </div>
                    <button class="delete-blog-button" type="button" title="Удалить статью" (click)="onDelete(post)">
                        <svg width="25px" height="25px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M5.11686 7.7517C5.53016 7.72415 5.88754 8.03685 5.91509 8.45015L6.37503 15.3493C6.46489 16.6971 6.52892 17.6349 6.66948 18.3406C6.80583 19.025 6.99617 19.3873 7.26958 19.6431C7.54299 19.8989 7.91715 20.0647 8.60915 20.1552C9.32255 20.2485 10.2626 20.25 11.6134 20.25H12.3868C13.7376 20.25 14.6776 20.2485 15.391 20.1552C16.083 20.0647 16.4572 19.8989 16.7306 19.6431C17.004 19.3873 17.1943 19.025 17.3307 18.3406C17.4713 17.6349 17.5353 16.6971 17.6251 15.3493L18.0851 8.45015C18.1126 8.03685 18.47 7.72415 18.8833 7.7517C19.2966 7.77925 19.6093 8.13663 19.5818 8.54993L19.1183 15.5017C19.0328 16.7844 18.9638 17.8206 18.8018 18.6336C18.6334 19.4789 18.347 20.185 17.7554 20.7385C17.1638 21.2919 16.4402 21.5308 15.5856 21.6425C14.7635 21.7501 13.7251 21.7501 12.4395 21.75H11.5607C10.2751 21.7501 9.23664 21.7501 8.4146 21.6425C7.55995 21.5308 6.8364 21.2919 6.2448 20.7385C5.65321 20.185 5.36679 19.4789 5.19839 18.6336C5.03642 17.8205 4.96736 16.7844 4.88186 15.5017L4.41841 8.54993C4.39086 8.13663 4.70357 7.77925 5.11686 7.7517Z" fill="#1C274C"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M10.3553 2.25004L10.3094 2.25002C10.093 2.24988 9.90445 2.24976 9.72643 2.27819C9.02313 2.39049 8.41453 2.82915 8.08559 3.46084C8.00232 3.62074 7.94282 3.79964 7.87452 4.00496L7.86 4.04858L7.76291 4.33984C7.74392 4.39681 7.73863 4.41251 7.73402 4.42524C7.55891 4.90936 7.10488 5.23659 6.59023 5.24964C6.5767 5.24998 6.56013 5.25004 6.50008 5.25004H3.5C3.08579 5.25004 2.75 5.58582 2.75 6.00004C2.75 6.41425 3.08579 6.75004 3.5 6.75004L6.50865 6.75004L6.52539 6.75004H17.4748L17.4915 6.75004L20.5001 6.75004C20.9143 6.75004 21.2501 6.41425 21.2501 6.00004C21.2501 5.58582 20.9143 5.25004 20.5001 5.25004H17.5001C17.44 5.25004 17.4235 5.24998 17.4099 5.24964C16.8953 5.23659 16.4413 4.90933 16.2661 4.42522C16.2616 4.41258 16.2562 4.39653 16.2373 4.33984L16.1402 4.04858L16.1256 4.00494C16.0573 3.79961 15.9978 3.62073 15.9146 3.46084C15.5856 2.82915 14.977 2.39049 14.2737 2.27819C14.0957 2.24976 13.9072 2.24988 13.6908 2.25002L13.6448 2.25004H10.3553ZM9.14458 4.93548C9.10531 5.04404 9.05966 5.14902 9.00815 5.25004H14.992C14.9405 5.14902 14.8949 5.04405 14.8556 4.9355L14.8169 4.82216L14.7171 4.52292C14.626 4.2494 14.605 4.19363 14.5842 4.15364C14.4745 3.94307 14.2716 3.79686 14.0372 3.75942C13.9927 3.75231 13.9331 3.75004 13.6448 3.75004H10.3553C10.067 3.75004 10.0075 3.75231 9.96296 3.75942C9.72853 3.79686 9.52566 3.94307 9.41601 4.15364C9.39519 4.19363 9.37419 4.24942 9.28302 4.52292L9.18322 4.82234C9.1682 4.86742 9.1565 4.90251 9.14458 4.93548Z" fill="#1C274C"/>
                        </svg>
                    </button>
                </li>
            }
        </ul>


        @if(blogStorage.getPostsCount() > 6) {
            <button class="blogs-button">
                Next
            </button>
        }

    </section>

    @if (showForm) {
        <app-add-blog-form 
            #addBlogForm
            (add)="onAdd($event)"
            (close)="showForm = false" 
        />
    }

    <aside class="admin-panel">
        <div class="admin-buttons-wrapper">
            <button 
                class="admin-add-blog-button"
                type="button"
                title="Создать статью"
                (click)="onShowFormClick()"
            >
                <svg class="button-svg" width="18" height="18" viewBox="0 0 18 18" fill="#61C15C" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 18C1.45 18 0.979 17.8043 0.587 17.413C0.195667 17.021 0 16.55 0 16V2C0 1.45 0.195667 0.979 0.587 0.587C0.979 0.195667 1.45 0 2 0H11V2H2V16H16V7H18V16C18 16.55 17.8043 17.021 17.413 17.413C17.021 17.8043 16.55 18 16 18H2ZM5 14V12H13V14H5ZM5 11V9H13V11H5ZM5 8V6H13V8H5ZM14 6V4H12V2H14V0H16V2H18V4H16V6H14Z" fill="#61C15C"/>
                </svg>
            </button>
            <button
                class="admin-show-stat-button" 
                type="button" 
                title="Показать статистику"
                (click)="openStats()"
            >
                <svg class="button-svg" width="22" height="21" viewBox="0 0 22 21" fill="#61C15C" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.88 16.47C19.32 15.77 19.58 14.96 19.58 14.08C19.58 11.59 17.57 9.58 15.08 9.58C12.59 9.58 10.58 11.59 10.58 14.08C10.58 16.57 12.59 18.58 15.07 18.58C15.95 18.58 16.77 18.32 17.46 17.88L20.58 21L22 19.58L18.88 16.47ZM15.08 16.58C13.7 16.58 12.58 15.46 12.58 14.08C12.58 12.7 13.7 11.58 15.08 11.58C16.46 11.58 17.58 12.7 17.58 14.08C17.58 15.46 16.46 16.58 15.08 16.58ZM14.72 8.08C13.98 8.1 13.27 8.26 12.62 8.53L12.07 7.7L8.27 13.88L5.26 10.36L1.63 16.17L0 15L5 7L8 10.5L12 4L14.72 8.08ZM17.31 8.58C16.67 8.3 15.98 8.13 15.26 8.09L20.38 0L22 1.18L17.31 8.58Z" fill="#61C15C"/>
                </svg>
            </button>
        </div>
    </aside>
    
    <app-statistic-modal
        [postsCount]="blogStorage.getPostsCount()"/>
</main>
