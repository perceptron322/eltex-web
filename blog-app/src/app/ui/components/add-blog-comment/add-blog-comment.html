<mat-card appearance="outlined" class="add-comment-card">
    <mat-card-header>                                                                                                                            
        <mat-card-title>Добавить комментарий</mat-card-title>                                                                                    
    </mat-card-header>                                                                                                                           

    <form [formGroup]="commentForm" (ngSubmit)="onSubmit()">
        <mat-card-content class="add-comment-content">                                                                                                                                                                                                                              
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Имя</mat-label>                                                                                                             
                <input matInput formControlName="username" placeholder="Как вас зовут?">                                                               
                <mat-icon matSuffix>person</mat-icon>
            </mat-form-field>
                            
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Текст комментария</mat-label>                                                                                               
                <textarea                     
                matInput
                formControlName="content"
                rows="3"                                                                                                                             
                cdkTextareaAutosize
                cdkAutosizeMinRows="3"                                                                                                               
                cdkAutosizeMaxRows="8"                                                                                                             
                placeholder="Текст комментария">                                                                                                       
                </textarea>                                                                                                                   
            </mat-form-field>                                                                                                                                                     
        </mat-card-content>

        <mat-card-actions align="end" class="add-comment-actions">                                                                               
            <button mat-button type="button" (click)="onCancel()">
                Отмена                                                                                                                                 
            </button>
            <button                                                                                                                                  
                mat-flat-button                                                                                                                      
                color="primary"
                type="submit"
                [disabled]="commentForm.invalid">
                <mat-icon>send</mat-icon>                                                                                                              
                Отправить
            </button>                                                                                                                                
        </mat-card-actions>                                                                                                                      
    </form>
</mat-card>
